
<!DOCTYPE html>
<html>

<head>
    <title>FindBack Safe Box Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        #map {
            height: 650px;
            width: 100%;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>
    <h2>FindBack Safe Boxes - Ernakulam</h2>
    <div id="map"></div>
    <script>
        // Create map centered in Ernakulam
        var map = L.map('map').setView([9.9816, 76.2999], 12);

        // Load OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // SAFE BOX ICON
        var safeIcon = L.icon({
            iconUrl: 'safe-box.png',
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -35]
        });

        // Safe box locations
        var safeboxes = [{
            name: "Ernakulam Junction Railway Station",
            lat: 9.9686,
            lng: 76.2917,
            type: "Railway Station"
        }, {
            name: "Cochin International Airport",
            lat: 10.1520,
            lng: 76.3913,
            type: "Airport"
        }, {
            name: "Aluva Metro Station",
            lat: 10.1076,
            lng: 76.3516,
            type: "Metro Station"
        }, {
            name: "Vyttila Mobility Hub Bus Stand",
            lat: 9.9672,
            lng: 76.3182,
            type: "Bus Stand"
        }];

        // Add markers and highlight
        safeboxes.forEach(function(box) {
            // Marker
            var marker = L.marker([box.lat, box.lng], {
                icon: safeIcon
            }).addTo(map);

            // Popup
            marker.bindPopup(
                "<b>" + box.name + "</b><br>" + box.type + "<br><br>FindBack Safe Box"
            );

            // Highlight circle
            L.circle([box.lat, box.lng], {
                radius: 400,
                color: "#1a73e8",
                fillColor: "#4da6ff",
                fillOpacity: 0.25
            }).addTo(map);
        });
    </script>
</body>
</html>
